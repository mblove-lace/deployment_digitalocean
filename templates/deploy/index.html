{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Moithilee</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- STATIC CSS -->
  <link rel="stylesheet" href="{% static 'css/vendor.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Jost&family=Marcellus&display=swap" rel="stylesheet">
</head>

<body class="homepage">

  <div class="error-page content-light jarallax d-flex align-items-center text-white" style="height: 100vh;">
    
    <!-- IMAGE FIXED -->
    <img src="{% static 'images/coming-soon-image.jpg' %}" 
         alt="coming-soon" class="jarallax-img">

    <div class="container">
      <div class="text-center">
        <h1>Coming Soon</h1>
        <div id="time-counter"></div>

        <div class="btn-center">
          <!-- Django URL (optional for later) -->
          <a href="/" class="btn btn-light btn-large text-uppercase">
            Go back to home
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- STATIC JS -->
  <script src="{% static 'js/jquery.min.js' %}"></script>
  <script src="{% static 'js/plugins.js' %}"></script>
  <script src="{% static 'js/SmoothScroll.js' %}"></script>
  <script src="{% static 'js/script.min.js' %}"></script>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Swiper -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

</body>
</html>
